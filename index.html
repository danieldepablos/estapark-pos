<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#723e7b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <title>EstaPark POS</title>
  <style>
    :root {
      --surface: #f7f3f6;
      --card: #ffffff;
      --text: #231a26;
      --muted: #6f6474;
      --line: #ebdfe9;
      --gradient: linear-gradient(135deg, #723e7b, #9b2352);
      --danger-bg: #fdecec;
      --danger-line: #efc3c3;
      --danger-text: #962f2f;
      --success-bg: #ecf8f1;
      --success-line: #c9ead7;
      --success-text: #18724c;
      --shadow: 0 18px 45px rgba(72, 38, 79, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    .shell {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 20px 16px 32px;
    }

    .hero {
      background: var(--gradient);
      color: #fff;
      border-radius: 28px;
      padding: 28px 20px 64px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .panel {
      margin-top: -40px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(114, 62, 123, 0.08);
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .ticket-input {
      width: 100%;
      min-height: 58px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      font-size: 1.05rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .ticket-input:focus {
      border-color: #8a4b93;
      box-shadow: 0 0 0 4px rgba(114, 62, 123, 0.12);
    }

    .button-grid {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .button {
      min-height: 56px;
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: var(--gradient);
      transition: transform 0.12s ease, opacity 0.2s ease;
    }

    .button.secondary {
      background: #3d3240;
    }

    .button.ghost {
      background: #b84242;
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #f7f1f7;
      color: #5c4d61;
      font-weight: 700;
      line-height: 1.4;
    }

    .status-box.success {
      background: var(--success-bg);
      border-color: var(--success-line);
      color: var(--success-text);
    }

    .status-box.error {
      background: var(--danger-bg);
      border-color: var(--danger-line);
      color: var(--danger-text);
    }

    .result-panel {
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #fcf9fc;
      border: 1px solid var(--line);
    }

    .result-panel[hidden] {
      display: none;
    }

    .result-grid {
      display: grid;
      gap: 12px;
    }

    .result-item {
      padding: 12px 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid #eee4ed;
    }

    .result-item span {
      display: block;
    }

    .result-item .label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-item .value {
      font-size: 1rem;
      font-weight: 800;
      word-break: break-word;
    }

    @media (min-width: 640px) {
      .shell {
        padding-top: 36px;
      }

      .button-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .result-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>EstaPark POS</h1>
      <p>Cines Unidos - Millenium - Gestión de Tickets.</p>
      <!-- Consulta, pago y exoneracion de tickets desde una interfaz simple, mobile first e instalable como PWA.-->  
    </section>

    <section class="panel">
      <form id="ticket-form">
        <label class="field-label" for="ticket-code">Codigo del ticket</label>
        <input
          id="ticket-code"
          class="ticket-input"
          type="text"
          placeholder="Ingresa el codigo"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          required
        >

        <div class="button-grid">
          <button id="verify-button" class="button" type="submit">Verificar</button>
          <button id="pay-button" class="button secondary" type="button" disabled>Pagar</button>
          <button id="waive-button" class="button ghost" type="button" disabled>Exonerar</button>
        </div>
      </form>

      <div id="status-box" class="status-box" role="status" aria-live="polite"></div>

      <section id="result-panel" class="result-panel" hidden>
        <div class="result-grid">
          <article class="result-item">
            <span class="label">Codigo</span>
            <span id="result-code" class="value">-</span>
          </article>
          <article class="result-item">
            <span class="label">Monto</span>
            <span id="result-amount" class="value">-</span>
          </article>
          <article class="result-item">
            <span class="label">Fecha de ingreso</span>
            <span id="result-enter-date" class="value">-</span>
          </article>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
